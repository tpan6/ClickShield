name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check clickshield/

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_capture.py
        # test_capture.py requires live Win32/UIA — skip in CI

      - name: Check imports
        run: python -c "import clickshield; print('Import OK')"
