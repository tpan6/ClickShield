name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            **Run from source** (Python 3.11+ required):
            ```powershell
            pip install -e .
            python -m clickshield
            ```

            A Windows installer (`.exe`) can be built locally with:
            ```powershell
            pip install -e ".[build]"
            .\installer\build.ps1
            ```

            See [README](https://github.com/tpan6/ClickShield#readme) for full setup instructions.

  build-windows:
    runs-on: windows-latest
    needs: release
    continue-on-error: true   # binary build failure doesn't fail the release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[build]"

      - name: Run pywin32 post-install
        run: python Scripts/pywin32_postinstall.py -install
        shell: cmd
        continue-on-error: true

      - name: Build with PyInstaller
        run: pyinstaller installer/clickshield.spec --noconfirm

      - name: Upload exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClickShield/ClickShield.exe
