name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            Requires **Python 3.11+** and **Windows 11**.

            ```powershell
            git clone https://github.com/tpan6/ClickShield
            cd ClickShield
            pip install -e .
            python -m clickshield
            ```

            The setup wizard launches on first run — paste your OpenAI API key and you're done.

            See the [README](https://github.com/tpan6/ClickShield#readme) for full instructions.
